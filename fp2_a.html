<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FP2級 A分野 特訓アプリ</title>
    <style>
        :root {
            --bg-color: #fffaf0;
            --card-bg: #ffffff;
            --main-pink: #ffdae0;
            --accent-pink: #ff85a2;
            --hachiware-blue: #e0f2ff;
            --star-yellow: #ffca28;
            --text-brown: #5a4a42;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-brown); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100dvh; 
            overflow: hidden; 
        }
        .container { 
            width: 100%; 
            max-width: 440px; 
            padding: 8px; 
            box-sizing: border-box; 
            /* 【極限】ご指定の3pxに設定 */
            padding-bottom: 3px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }
        .progress-container { width: 100%; height: 5px; background-color: #eee; border-radius: 3px; margin-bottom: 5px; flex-shrink: 0;}
        #progress-bar { height: 100%; width: 0%; background-color: var(--accent-pink); border-radius: 3px; transition: width 0.3s; }
        .card { 
            background: var(--card-bg); 
            border: 3px solid var(--main-pink); 
            border-radius: 18px; 
            padding: 10px 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            text-align: center; 
            position: relative; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .star-btn { position: absolute; top: 5px; right: 8px; font-size: 1.2rem; cursor: pointer; border: none; background: none; color: #ddd; z-index: 10; }
        .star-btn.active { color: var(--star-yellow); }
        .mode-badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.65rem; margin-bottom: 2px; font-weight: bold; }
        .mode-normal { background: var(--main-pink); color: var(--text-brown); }
        .mode-test { background: #ce93d8; color: white; }
        .mode-review { background: #fff176; color: #856404; }
        .mode-fav { background: #ffe082; color: #795548; }
        .q-header { font-size: 0.75rem; font-weight: bold; color: var(--accent-pink); margin-bottom: 2px; }
        
        .q-text { 
            font-size: 1.0rem; 
            line-height: 1.4; 
            margin-bottom: 8px; 
            max-height: 30%; 
            display: flex; 
            align-items: flex-start; 
            text-align: left; 
            overflow-y: auto; 
            padding-top: 2px; 
            flex-shrink: 0;
        }
        .btn-group { display: flex; gap: 8px; margin-top: auto; margin-bottom: 2px; flex-shrink: 0; }
        .btn-main { flex: 1; padding: 14px; font-size: 1.6rem; border: none; border-radius: 12px; cursor: pointer; transition: 0.1s; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }
        .btn-o { background-color: #ffb7c5; color: white; }
        .btn-x { background-color: #a0d8ef; color: white; }

        #answer-section { 
            display: none; 
            padding: 8px 10px; 
            background-color: var(--hachiware-blue); 
            border-radius: 12px; 
            flex-direction: column;
            flex-grow: 1;
            overflow-y: hidden;
            animation: fadeIn 0.15s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .result-msg { font-size: 1.1rem; font-weight: bold; margin-bottom: 3px; flex-shrink: 0;}
        .explanation { 
            font-size: 0.9rem; 
            text-align: left; 
            line-height: 1.5; 
            margin-bottom: 6px; 
            overflow-y: auto; 
            color: #333; 
            border-top: 1px dashed rgba(0,0,0,0.1); 
            padding-top: 6px; 
            flex-grow: 1;
        }
        .memo-area { margin-bottom: 6px; text-align: left; flex-shrink: 0; }
        .memo-label { font-size: 0.65rem; font-weight: bold; color: var(--accent-pink); display: block; margin-bottom: 1px; }
        .memo-input { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 5px; font-size: 0.85rem; font-family: inherit; background: #fff; box-sizing: border-box; resize: none; }
        
        .btn-next { width: 100%; background-color: var(--accent-pink); color: white; font-size: 1.1rem; border-radius: 10px; border:none; padding: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #d66d85; margin-bottom: 4px; flex-shrink: 0; }
        
        /* 【修正】Geminiボタンを少し離しました */
        .btn-copy { 
            width: auto; 
            background-color: transparent; 
            color: #888; 
            border: 1px solid #ccc; 
            font-size: 0.6rem; 
            padding: 3px 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: block; 
            margin: 15px auto 0 auto; /* 上に15pxの余白 */
            flex-shrink: 0;
        }

        .footer-btns { 
            margin-top: 8px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            z-index: 10; 
            flex-shrink: 0;
        }
        .btn-sub { padding: 12px; font-size: 0.85rem; background: #eee; border-radius: 8px; color: #666; border:none; cursor: pointer; font-weight: bold; }
        
        .modal-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.5); display:none; justify-content:center; 
            align-items:center; z-index:200; 
        }
        .modal-content { background: white; width: 85%; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-btn { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card-bg); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; padding: 20px; box-sizing: border-box; }
        #copy-toast { display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.75rem; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div class="card" id="main-card">
        <button id="star-btn" class="star-btn" onclick="toggleFav()">★</button>
        <div id="mode-display" class="mode-badge mode-normal">通常モード</div>
        <div id="q-header-text" class="q-header">読み込み中...</div>
        <div class="q-text" id="q-content">データを読み込んでいます...</div>

        <div class="btn-group" id="btn-group">
            <button class="btn-main btn-o" onclick="check('⚪︎')">⚪︎</button>
            <button class="btn-main btn-x" onclick="check('×')">×</button>
        </div>

        <div id="answer-section">
            <div id="result-msg" class="result-msg"></div>
            <div id="explanation" class="explanation"></div>
            <div class="memo-area">
                <label class="memo-label">✎ マイメモ</label>
                <textarea class="memo-input" id="memo-input" rows="2" placeholder="覚え方などをメモ..." oninput="saveMemo()"></textarea>
            </div>
            <button class="btn-next" onclick="next()">次の問題へ ▶</button>
            <button class="btn-copy" onclick="copyForGemini()">Geminiに聞くテキストをコピー 📋</button>
        </div>

        <div id="test-result-screen" class="result-overlay">
            <h2 style="color:var(--accent-pink); margin-bottom: 10px;">テスト終了！</h2>
            <p id="test-score-text" style="font-size: 1.2rem; margin-bottom: 25px; font-weight: bold;"></p>
            <button class="btn-next" style="width: 80%;" onclick="finishTest()">通常モードに戻る</button>
        </div>
    </div>
    <div class="footer-btns">
        <button class="btn-sub" onclick="openMenu()" style="background: #e1bee7; color: #4a148c;">☰ メニュー</button>
        <button class="btn-sub" onclick="location.href='index.html'">🏠 ホームへ</button>
    </div>
</div>

<div class="modal-overlay" id="menu-modal" onclick="closeMenu()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title">学習メニュー</div>
        <button class="modal-btn" style="background:#ce93d8; color:white;" onclick="startTest(); closeMenu();">10問テスト</button>
        <button class="modal-btn" style="background:#fff176; color:#856404;" onclick="startReview(); closeMenu();">復習モード (<span id="rev-count-m">0</span>)</button>
        <button class="modal-btn" style="background:#ffe082; color:#795548;" onclick="startFav(); closeMenu();">お気に入り (<span id="fav-count-m">0</span>)</button>
        <button class="modal-btn" id="reset-btn" style="background:#eee; color:#666;" onclick="resetApp()">データをリセット</button>
        <button class="modal-btn" style="background:#ddd; color:#333; margin-top:10px;" onclick="closeMenu()">閉じる</button>
    </div>
</div>
<div id="copy-toast">コピーしました！</div>

<script>
    const questions = [
       {
        "no": 1,
        "question": "税理士の登録を受けていないFPが、ふるさと納税について相談に来た顧客の求めに応じ、顧客の年間収入や家族構成をもとに寄附金控除の額を計算し、確定申告書の作成を代行した。",
        "answer": "×",
        "explanation": "確定申告書などの税務書類の作成は、税理士の登録を受けていないFPが行うことはできません。"
      },
      {
        "no": 2,
        "question": "税理士の登録を受けていないFPが、顧客から配偶者控除と配偶者特別控除の適用要件を聞かれ、所得税法の条文等を示しつつ、それぞれの適用要件の違いを説明した。",
        "answer": "⚪︎",
        "explanation": "配偶者控除などの税制に関する一般的な説明を行うことは、税理士法に抵触しないため、税理士の登録を受けていないFPでも可能です。"
      },
      {
        "no": 3,
        "question": "弁護士の登録を受けていないFPが、顧客から配偶者居住権について相談を受け、関連法令の条文を示しながら、制度の概要を無償で説明した。",
        "answer": "⚪︎",
        "explanation": "弁護士資格を保有していない者であっても、無償にて一般的な法制度の説明を行うことは可能です。なお、報酬を得る目的で具体的な法律事件についての相談や、個別的なアドバイスを行うことはできません。"
      },
      {
        "no": 4,
        "question": "弁護士の登録を受けていないFPが、相続について相談に来た顧客の求めに応じ、顧客と代理人契約を締結し、顧客の代理人として、有償で他の相続人との遺産分割協議を行った。",
        "answer": "×",
        "explanation": "弁護士資格のないFPが有償で他の相続人との遺産分割協議を代理人として行うことは、弁護士法違反となります。"
      },
      {
        "no": 5,
        "question": "弁護士の登録を受けていないFPが、顧客から公正証書遺言の作成時の証人になることを要請され、証人としての欠格事由に該当しないことを確認したうえで、有償で証人になった。",
        "answer": "⚪︎",
        "explanation": "公正証書遺言の証人となることにおいて、弁護士資格等の特別な資格は不要です。公正証書遺言の証人においては、一定の欠格事由（未成年者や推定相続人など）に該当しなければ、有償で証人となっても問題ありません。\n独占業務に関する問題では、原則として「「一般的な」＝OK」、「『個別具体的な』＝NG」という覚え方で問題ありません。しかし、本問題のように一見すると独占業務のように見えるものもありますので、そういった例外だけ問題演習で押さえていきましょう。"
      },
      {
        "no": 6,
        "question": "司法書士の登録を受けていないFPが、顧客から将来判断能力が不十分になった場合の財産の管理を依頼され、有償で当該顧客の任意後見受任者となった。",
        "answer": "⚪︎",
        "explanation": "任意後見受任者になるために資格は不要であるため、有償無償を問わず、誰でもなることが可能です。"

      {
        "no": 7,

        "answer": "×",
        "explanation": "登記手続きの代理や書類作成を業として行うことは司法書士の独占業務とされているため、司法書士の資格を有しないFPが申請書を作成し、登記手続きを代行することはできません。"
      },
      {
        "no": 8,
        "question": "社会保険労務士の登録を受けていないFPが、年金について相談に来た顧客の求めに応じ、公的年金の老齢給付を繰り上げた場合と繰り下げた場合の受給額について、それぞれの見込額を試算して説明した。",
        "answer": "⚪︎",
        "explanation": "社会保険労務士の登録を受けていないFPであっても、公的年金に関する一般的な情報の提供や、計算ツールを使用した受給見込み額の試算は可能です。"
      },
      {
        "no": 9,
        "question": "社会保険労務士の登録を受けていないFPが、顧客から老齢厚生年金の繰下げ支給について相談を受け、有償で老齢厚生年金の支給繰下げ請求書を作成し、請求手続きを代行した。",
        "answer": "×",
        "explanation": "年金の請求手続きは、社会保険労務士の独占業務とされており、社会保険労務士の登録を受けていないFPが行うことはできません。\n社会保険労務士の独占業務には、労働保険や社会保険の書類の作成・提出代行などの1号業務と、労働社会保険に関する帳簿書類の作成などの2号業務があります。"
      },
      {
        "no": 10,
        "question": "生命保険募集人の登録を受けていないFPが、ライフプランについて相談に来た顧客に対して、生命保険の一般的な商品内容や目的別の活用方法を有償で説明した。",
        "answer": "⚪︎",
        "explanation": "有償でのライフプランニングにおける生命保険の必要性に関する助言や、各社の生命保険商品の特徴や一般的な商品性の説明は、生命保険募集人の登録を受けていないFPでも可能となっています。"
      },
      {
        "no": 11,
        "question": "金融商品取引業の登録を受けていないFPが、顧客からiDeCo（確定拠出年金の個人型年金）について相談を受け、iDeCoの運用商品の一般的な特徴について無償で説明した。",
        "answer": "⚪︎",
        "explanation": "iDeCoの運用商品の一般的な特徴について無償で説明することは、金融商品取引業の登録を受けていないFPでも可能となっています。"
      },

        "no": 12,
        "question": "金融商品取引業の登録を受けていないFPが、金融資産運用に関心のある不特定多数の者に対して、有価証券の価値の分析に基づき、インターネットを利用して個別・相対性の高い投資情報を有償で提供した。",
        "answer": "×",
        "explanation": "有償で個別具体的に投資の助言や代理業、運用を行う場合は、内閣総理大臣の登録が必要となります。"
      },
      {
        "no": 13,
        "question": "FPは、官公庁が作成した転載を禁止する旨の表示がない広報資料をインターネットで入手し、その許諾を得ることなく、自身が開催した資産運用に関するセミナーのレジュメで出典を明記して使用した。",
        "answer": "⚪︎",
        "explanation": "官公庁の広報資料では、転載を禁止する表示がない限り、出典を明記すれば許諾なく使用することが可能です。"

        "answer": "×",

        "no": 19,

    if(questions.length < 192) {
        for(let i=3; i<=192; i++) {
            questions.push({"no":i,"question":`【A分野 No.${i}】本番データ。`,"answer":i%2===0?"⚪︎":"×","explanation":`No.${i}の解説。`});
        }
    }

    let currentIdx = 0;
    let mode = 'normal'; 
    let lastUserAns = "";
    let reviewList = JSON.parse(localStorage.getItem('fp_review_list')) || [];
    let favList = JSON.parse(localStorage.getItem('fp_fav_list')) || [];
    let memoData = JSON.parse(localStorage.getItem('fp_memos')) || {};
    let testIndices = []; let testCurrentIdx = 0; let testCorrectCount = 0; let resetClickCount = 0;

    const saved = localStorage.getItem('fp_progress_v12');
    if (saved) currentIdx = parseInt(saved);

    function update() {
        let q;
        const modeDisp = document.getElementById('mode-display');
        const qHeader = document.getElementById('q-header-text');
        const ansSec = document.getElementById('answer-section');
        const btnGrp = document.getElementById('btn-group');
        const resOverlay = document.getElementById('test-result-screen');
        ansSec.style.display = 'none'; btnGrp.style.display = 'flex'; resOverlay.style.display = 'none';

        if (mode === 'test') {
            q = questions[testIndices[testCurrentIdx]];
            modeDisp.innerText = "10問テスト"; modeDisp.className = "mode-badge mode-test";
            qHeader.innerHTML = (testCurrentIdx + 1) + ' / 10';
        } else if (mode === 'review') {
            if (reviewList.length === 0) { mode = 'normal'; return update(); }
            q = questions[reviewList[0]];
            modeDisp.innerText = "復習モード"; modeDisp.className = "mode-badge mode-review";
            qHeader.innerHTML = '残り ' + reviewList.length + ' 問';
        } else if (mode === 'fav') {
            if (favList.length === 0) { mode = 'normal'; return update(); }
            q = questions.find(item => item.no === favList[0]) || questions[0];
            modeDisp.innerText = "お気に入り"; modeDisp.className = "mode-badge mode-fav";
            qHeader.innerHTML = '残り ' + favList.length + ' 問';
        } else {
            q = questions[currentIdx];
            modeDisp.innerText = "通常モード"; modeDisp.className = "mode-badge mode-normal";
            qHeader.innerHTML = 'No. ' + q.no + ' / ' + questions.length;
        }

        const targetIdx = getCurrentTargetIdx();
        const qNo = questions[targetIdx].no;
        document.getElementById('star-btn').className = favList.includes(qNo) ? "star-btn active" : "star-btn";
        document.getElementById('q-content').innerText = q.question;
        document.getElementById('memo-input').value = memoData[qNo] || "";
        document.getElementById('rev-count-m').innerText = reviewList.length;
        document.getElementById('fav-count-m').innerText = favList.length;
        const percent = mode === 'normal' ? ((currentIdx) / questions.length) * 100 : 100;
        document.getElementById('progress-bar').style.width = percent + '%';
    }

    function getCurrentTargetIdx() {
        if (mode === 'test') return testIndices[testCurrentIdx];
        if (mode === 'review') return reviewList[0];
        if (mode === 'fav') return questions.findIndex(q => q.no === favList[0]);
        return currentIdx;
    }

function check(userAns) {
        lastUserAns = userAns;
        const targetIdx = getCurrentTargetIdx();
        const q = questions[targetIdx];
        document.getElementById('btn-group').style.display = 'none';
        document.getElementById('answer-section').style.display = 'flex';

        // --- 修正ポイント：○と×の両方の表記ゆれを吸収 ---
        // まる判定用の関数（いろいろな「まる」をカバー）
        const isMaru = (val) => ['○', '⚪︎', '⚪', '〇'].includes(val);
        // ばつ判定用の関数（いろいろな「ばつ」や「エックス」をカバー）
        const isBatsu = (val) => ['×', 'x', 'X', '✕', '✖'].includes(val);

        const isCorrect = (isMaru(userAns) && isMaru(q.answer)) || 
                          (isBatsu(userAns) && isBatsu(q.answer));
        // ----------------------------------------------

        const resMsg = document.getElementById('result-msg');
        if (isCorrect) {
            resMsg.innerText = "正解 ✅"; resMsg.style.color = "#ff4d79";
            if (mode === 'test') testCorrectCount++;
            if (mode === 'review') reviewList.shift();
            if (mode === 'fav') favList.shift();
        } else {
            resMsg.innerText = "不正解 ❌"; resMsg.style.color = "#007bff";
            if (!reviewList.includes(targetIdx)) reviewList.push(targetIdx);
            if (mode === 'review') reviewList.push(reviewList.shift());
            if (mode === 'fav') favList.push(favList.shift());
        }
        localStorage.setItem(KEY_REVIEW, JSON.stringify(reviewList));
        localStorage.setItem(KEY_FAV, JSON.stringify(favList));
        document.getElementById('explanation').innerHTML = "<b>正解：" + q.answer + "</b><br>" + q.explanation;
    }

    function next() {
        if (mode === 'test') { testCurrentIdx++; if (testCurrentIdx >= testIndices.length) return showTestResult(); }
        else if (mode === 'normal') { currentIdx++; if (currentIdx >= questions.length) currentIdx = 0; localStorage.setItem('fp_progress_v12', currentIdx); }
        update();
    }

    function startTest() {
        const maxIdx = currentIdx === 0 ? 1 : currentIdx;
        let pool = Array.from({length: maxIdx + 1}, (_, i) => i);
        for (let i = pool.length - 1; i > 0; i--) { const r = Math.floor(Math.random() * (i + 1)); [pool[i], pool[r]] = [pool[r], pool[i]]; }
        testIndices = pool.slice(0, 10); mode = 'test'; testCurrentIdx = 0; testCorrectCount = 0; update();
    }

    function openMenu() { document.getElementById('menu-modal').style.display = 'flex'; }
    function closeMenu() { document.getElementById('menu-modal').style.display = 'none'; }
    function finishTest() { mode = 'normal'; update(); }
    function startReview() { mode = 'review'; update(); }
    function startFav() { mode = 'fav'; update(); }
    function toggleFav() {
        const targetIdx = getCurrentTargetIdx(); const qNo = questions[targetIdx].no;
        const pos = favList.indexOf(qNo); if (pos > -1) favList.splice(pos, 1); else favList.push(qNo);
        localStorage.setItem('fp_fav_list', JSON.stringify(favList)); update();
    }
    function saveMemo() { const targetIdx = getCurrentTargetIdx(); const qNo = questions[targetIdx].no; memoData[qNo] = document.getElementById('memo-input').value; localStorage.setItem('fp_memos', JSON.stringify(memoData)); }
    function copyForGemini() {
        const targetIdx = getCurrentTargetIdx(); const q = questions[targetIdx];
        const text = `以下のFP2級の問題について教えてください。\n\n【問題】\n${q.question}\n\n【正解】\n${q.answer}\n\n【解説】\n${q.explanation}\n\n背景や覚え方を詳しく教えて。`;
        navigator.clipboard.writeText(text).then(() => { const toast = document.getElementById('copy-toast'); toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2000); });
    }
    function resetApp() { const btn = document.getElementById('reset-btn'); resetClickCount++; if (resetClickCount === 1) { btn.innerText = "本当によろしいですか？"; btn.style.backgroundColor = "#ffcdd2"; setTimeout(() => { resetClickCount = 0; btn.innerText = "データをリセット"; btn.style.backgroundColor = "#eee"; }, 3000); } else if (resetClickCount === 2) { localStorage.clear(); location.reload(); } }
    function showTestResult() { document.getElementById('test-result-screen').style.display = 'flex'; document.getElementById('test-score-text').innerText = `10問中 ${testCorrectCount}問 正解！`; }
    update();
</script>
