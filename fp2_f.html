<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FP2級 F分野 特訓アプリ</title>
    <style>
        :root {
            --bg-color: #fffaf0;
            --card-bg: #ffffff;
            --main-pink: #ffdae0;
            --accent-pink: #ff85a2;
            --hachiware-blue: #e0f2ff;
            --star-yellow: #ffca28;
            --text-brown: #5a4a42;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-brown); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100dvh; 
            overflow: hidden; 
        }
        .container { 
            width: 100%; 
            max-width: 440px; 
            padding: 8px; 
            box-sizing: border-box; 
            padding-bottom: 3px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }
        .progress-container { width: 100%; height: 5px; background-color: #eee; border-radius: 3px; margin-bottom: 5px; flex-shrink: 0;}
        #progress-bar { height: 100%; width: 0%; background-color: var(--accent-pink); border-radius: 3px; transition: width 0.3s; }
        .card { 
            background: var(--card-bg); 
            border: 3px solid var(--main-pink); 
            border-radius: 18px; 
            padding: 10px 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            text-align: center; 
            position: relative; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .star-btn { position: absolute; top: 5px; right: 8px; font-size: 1.2rem; cursor: pointer; border: none; background: none; color: #ddd; z-index: 10; }
        .star-btn.active { color: var(--star-yellow); }
        .mode-badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.65rem; margin-bottom: 2px; font-weight: bold; }
        .mode-normal { background: var(--main-pink); color: var(--text-brown); }
        .mode-test { background: #ce93d8; color: white; }
        .mode-review { background: #fff176; color: #856404; }
        .mode-fav { background: #ffe082; color: #795548; }
        .q-header { font-size: 0.75rem; font-weight: bold; color: var(--accent-pink); margin-bottom: 2px; }
        
        .q-text { 
            font-size: 1.0rem; 
            line-height: 1.4; 
            margin-bottom: 8px; 
            max-height: 30%; 
            display: flex; 
            align-items: flex-start; 
            text-align: left; 
            overflow-y: auto; 
            padding-top: 2px; 
            flex-shrink: 0;
        }
        .btn-group { display: flex; gap: 8px; margin-top: auto; margin-bottom: 2px; flex-shrink: 0; }
        .btn-main { flex: 1; padding: 14px; font-size: 1.6rem; border: none; border-radius: 12px; cursor: pointer; transition: 0.1s; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }
        .btn-o { background-color: #ffb7c5; color: white; }
        .btn-x { background-color: #a0d8ef; color: white; }

        #answer-section { 
            display: none; 
            padding: 8px 10px; 
            background-color: var(--hachiware-blue); 
            border-radius: 12px; 
            flex-direction: column;
            flex-grow: 1;
            overflow-y: hidden;
            animation: fadeIn 0.15s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .result-msg { font-size: 1.1rem; font-weight: bold; margin-bottom: 3px; flex-shrink: 0;}
        .explanation { 
            font-size: 0.9rem; 
            text-align: left; 
            line-height: 1.5; 
            margin-bottom: 6px; 
            overflow-y: auto; 
            color: #333; 
            border-top: 1px dashed rgba(0,0,0,0.1); 
            padding-top: 6px; 
            flex-grow: 1;
        }
        .memo-area { margin-bottom: 6px; text-align: left; flex-shrink: 0; }
        .memo-label { font-size: 0.65rem; font-weight: bold; color: var(--accent-pink); display: block; margin-bottom: 1px; }
        .memo-input { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 5px; font-size: 0.85rem; font-family: inherit; background: #fff; box-sizing: border-box; resize: none; }
        .btn-next { width: 100%; background-color: var(--accent-pink); color: white; font-size: 1.1rem; border-radius: 10px; border:none; padding: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #d66d85; margin-bottom: 4px; flex-shrink: 0; }
        .btn-copy { 
            width: auto; 
            background-color: transparent; 
            color: #888; 
            border: 1px solid #ccc; 
            font-size: 0.6rem; 
            padding: 3px 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: block; 
            margin: 15px auto 0 auto; 
            flex-shrink: 0;
        }
        .footer-btns { 
            margin-top: 8px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            z-index: 10; 
            flex-shrink: 0;
        }
        .btn-sub { padding: 12px; font-size: 0.85rem; background: #eee; border-radius: 8px; color: #666; border:none; cursor: pointer; font-weight: bold; }
        .modal-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.5); display:none; justify-content:center; 
            align-items:center; z-index:200; 
        }
        .modal-content { background: white; width: 85%; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-btn { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card-bg); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; padding: 20px; box-sizing: border-box; }
        #copy-toast { display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.75rem; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div class="card" id="main-card">
        <button id="star-btn" class="star-btn" onclick="toggleFav()">★</button>
        <div id="mode-display" class="mode-badge mode-normal">通常モード</div>
        <div id="q-header-text" class="q-header">読み込み中...</div>
        <div class="q-text" id="q-content">データを読み込んでいます...</div>

        <div class="btn-group" id="btn-group">
            <button class="btn-main btn-o" onclick="check('⚪︎')">⚪︎</button>
            <button class="btn-main btn-x" onclick="check('×')">×</button>
        </div>

        <div id="answer-section">
            <div id="result-msg" class="result-msg"></div>
            <div id="explanation" class="explanation"></div>
            <div class="memo-area">
                <label class="memo-label">✎ マイメモ</label>
                <textarea class="memo-input" id="memo-input" rows="2" placeholder="覚え方などをメモ..." oninput="saveMemo()"></textarea>
            </div>
            <button class="btn-next" onclick="next()">次の問題へ ▶</button>
            <button class="btn-copy" onclick="copyForGemini()">Geminiに聞くテキストをコピー 📋</button>
        </div>

        <div id="test-result-screen" class="result-overlay">
            <h2 style="color:var(--accent-pink); margin-bottom: 10px;">テスト終了！</h2>
            <p id="test-score-text" style="font-size: 1.2rem; margin-bottom: 25px; font-weight: bold;"></p>
            <button class="btn-next" style="width: 80%;" onclick="finishTest()">通常モードに戻る</button>
        </div>
    </div>
    <div class="footer-btns">
        <button class="btn-sub" onclick="openMenu()" style="background: #e1bee7; color: #4a148c;">☰ メニュー</button>
        <button class="btn-sub" onclick="location.href='index.html'">🏠 ホームへ</button>
    </div>
</div>

<div class="modal-overlay" id="menu-modal" onclick="closeMenu()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title">学習メニュー</div>
        <button class="modal-btn" style="background:#ce93d8; color:white;" onclick="startTest(); closeMenu();">10問テスト</button>
        <button class="modal-btn" style="background:#fff176; color:#856404;" onclick="startReview(); closeMenu();">復習モード (<span id="rev-count-m">0</span>)</button>
        <button class="modal-btn" style="background:#ffe082; color:#795548;" onclick="startFav(); closeMenu();">お気に入り (<span id="fav-count-m">0</span>)</button>
        <button class="modal-btn" id="reset-btn" style="background:#eee; color:#666;" onclick="resetApp()">データをリセット</button>
        <button class="modal-btn" style="background:#ddd; color:#333; margin-top:10px;" onclick="closeMenu()">閉じる</button>
    </div>
</div>
<div id="copy-toast">コピーしました！</div>

<script>
    // 【F分野用修正】問題データ（815番〜986番）
    const questions = [
        {
        "no": 815,
        "question": "親族の範囲は、3親等内の血族、配偶者、6親等内の姻族である。",
        "answer": "×",
        "explanation": "民法における親族の範囲は、6親等内の血族、配偶者、3親等内の姻族とされています。民法上の血族とは、血のつながりのある親族（曽祖父母、孫、叔父叔母、甥姪、いとこなど）のことを指します。姻族とは、配偶者の両親や配偶者の兄弟姉妹など、結婚したことで家族になった人を指します。"
      },
      {
        "no": 816,
        "question": "子の配偶者は、2親等の姻族である。",
        "answer": "×",
        "explanation": "民法における親族の範囲について、子の配偶者は1親等の姻族です。"
      },
      {
        "no": 817,
        "question": "被相続人と婚姻の届出をしていないが、被相続人といわゆる内縁関係にあった者は、被相続人の配偶者とみなされて相続人となる。",
        "answer": "×",
        "explanation": "婚姻の届出をしていない内縁の配偶者には、法定相続権はありません。ただし、被相続人が生前に遺言を残すことで遺贈を受けることは可能です。"
      },
      {
        "no": 818,
        "question": "胎児は、死産とならない限り、相続開始時にすでに生まれたものとみなされる。",
        "answer": "○",
        "explanation": "胎児は、相続においてはすでに生まれたものとみなされ、相続権を有します。"
      },
      {
        "no": 819,
        "question": "嫡出でない子の法定相続分は、嫡出である子の法定相続分と同じである。",
        "answer": "○",
        "explanation": "法定相続分は、実子や養子、嫡出子、非嫡出子などの区別なく、すべて「子」として同じ法定相続分となります。嫡出子とは、婚姻中の夫婦の間に生まれた子どもを指します。これに対して、婚姻中でない男女の間に生まれた子どもが非嫡出子となります。"
      },
      {
        "no": 820,
        "question": "離婚した元配偶者との間に出生した被相続人の子が当該元配偶者の親権に服している場合、その子は相続人とならない。",
        "answer": "×",
        "explanation": "子は被相続人の親権の有無にかかわらず、実子である限り相続権を持ちます。"
      },
      {
        "no": 821,
        "question": "特別養子縁組の成立には、原則として、養子となる者の父母の同意がなければならない。",
        "answer": "○",
        "explanation": "特別養子縁組とは、実父母との親族関係を終了させて、養父母とのみ親子関係になる養子縁組です。したがって、特別養子縁組の成立には、原則として実父母の同意が必要です。"
      },
      {
        "no": 822,
        "question": "民法上の相続人等に関して、成年に達した者は、尊属または年長者以外の者を養子とすることができるが、養子には人数制限があり、実子のいる者は1人まで、実子のいない者は2人までである。",
        "answer": "×",
        "explanation": "民法では、養子とすることができる人数に制限はありません。\n民法上のルールと相続税法上のルールを混同しないように気を付けましょう。この後に学習する相続税法上の相続人のカウントでは、養子を加えられる人数に制限があります。しかし、そもそも養子にできるかどうか、という民法上のルールでは制限がありません。"
      },
      {
        "no": 823,
        "question": "25歳以上の者は、配偶者を有していなくても、特別養子縁組により養親となることができる。",
        "answer": "×",
        "explanation": "特別養子縁組の養親は、夫婦でなければなりません。したがって、単身者は特別養子縁組をすることはできません。"
      },
      {
        "no": 824,
        "question": "養子の法定相続分は、実子の法定相続分と同じである。",
        "answer": "○",
        "explanation": "養子は実子と同じ法定相続分を有します。これは特別養子でも普通養子でも同様に取り扱われます。"
      },
      {
        "no": 825,
        "question": "父母の一方のみを同じくする兄弟姉妹の法定相続分は、父母の双方を同じくする兄弟姉妹の法定相続分と同じである。",
        "answer": "×",
        "explanation": "両父母の一方のみを同じくする（半血）の兄弟姉妹の法定相続分は、父母の双方を同じくする（全血）の兄弟姉妹の2分の1となります。"
      },
      {
        "no": 826,
        "question": "相続人が被相続人の配偶者および姉の合計2人である場合、配偶者の法定相続分は4分の3、姉の法定相続分は4分の1である。",
        "answer": "○",
        "explanation": "相続人が配偶者と兄弟姉妹の場合、配偶者の法定相続分は4分の3、兄弟姉妹の法定相続分は4分の1です。"
      },
      {
        "no": 827,
        "question": "代襲相続人が1人である場合の当該代襲相続人の法定相続分は、被代襲者が受けるべきであった法定相続分と同じである。",
        "answer": "○",
        "explanation": "代襲相続では、被代襲者（亡くなった相続人）が受けるはずだった相続分をそのまま引き継ぎます。"
      },
      {
        "no": 828,
        "question": "被相続人の子が廃除により相続権を失った場合、その者に被相続人の直系卑属である子がいるときは、その子（被相続人の孫）は代襲相続人となる。",
        "answer": "○",
        "explanation": "相続の廃除により相続権を失った者の子は、代襲相続をすることができます。\n廃除とは、推定相続人が被相続人に対して虐待をしていたなどの著しい非行があったときに、被相続人がその相続人の相続権を奪うことができる制度です。相続人が、廃除された場合でも、廃除された相続人の子には罪がありませんので、代襲相続が行われることとなります。"
      },
      {
        "no": 829,
        "question": "被相続人の子が相続の放棄をした場合、その相続の放棄をした者の子（被相続人の孫）は、代襲相続人とならない。",
        "answer": "○",
        "explanation": "相続の放棄をした場合、その者の相続権は最初からなかったものとみなされるため、代襲相続は発生しません。\n廃除と対照的に、相続の放棄は、相続人の意思で財産を放棄しているため、その意思を無視して子が代襲相続することにはなりません"
      },
      {
        "no": 830,
        "question": "相続の単純承認をした相続人は、被相続人の財産のうち、積極財産のみを相続する。",
        "answer": "×",
        "explanation": "単純承認をした相続人は、被相続人の積極財産（プラスの財産）だけでなく、消極財産（負債などのマイナスの財産）もすべて相続します。"
      },
      {
        "no": 831,
        "question": "限定承認は、相続人が複数いる場合、限定承認を行おうとする者が単独ですることができる。",
        "answer": "×",
        "explanation": "限定承認は、相続人全員が共同して行わなければなりません。相続人のうち1人でも単純承認や放棄をすると、他の相続人は限定承認を選択できなくなります。"
      },
      {
        "no": 832,
        "question": "相続の放棄をする場合は、相続人は相続の開始があったことを知った時から原則として、6カ月以内に家庭裁判所に申述しなければならない。",
        "answer": "×",
        "explanation": "相続の放棄は、相続の開始があったことを知った日から3カ月以内に家庭裁判所へ申述しなければなりません。"
      },
      {
        "no": 833,
        "question": "相続人が複数いる場合、各共同相続人は、被相続人の遺言により相続分や遺産分割方法の指定がされていなければ、法定相続分どおりに相続財産を分割しなければならない。",
        "answer": "×",
        "explanation": "共同相続人は、法定相続分にかかわらず、遺産分割協議によって全員が合意した内容で財産を分けることができます。"
      },
      {
        "no": 834,
        "question": "契約者（保険料負担者）および被保険者が夫、死亡保険金受取人が妻である生命保険契約において、夫の死亡により妻が受け取った死亡保険金は、受取人の固有の財産であり、原則として、遺産分割協議の対象とならない。",
        "answer": "○",
        "explanation": "生命保険の死亡保険金は、受取人固有の財産とされるため、遺産分割協議の対象にはなりません。\n受取人固有の財産であるメリットとして、遺産分割協議が調わなくても、受取人がその財産全額を受け取れることなどが挙げられます。"
      },
      {
        "no": 835,
        "question": "共同相続人の1人が遺産の分割前にその相続分を共同相続人以外の第三者に譲り渡した場合、他の共同相続人は、当該第三者に対して一定期間内にその価額および費用を支払うことで、その相続分を譲り受けることができる。",
        "answer": "○",
        "explanation": "相続人となった者は、遺産分割前に自己の相続分を第三者に譲り渡すことができます。しかし、共同相続人としては、第三者に財産が渡ることによる遺産分割への支障が考えられるため、共同相続人は、譲渡から1カ月以内という期間に限り、譲渡した相続分を第三者から買い戻すことができます。"
      },
      {
        "no": 836,
        "question": "遺産分割協議書は、相続人が相続の開始があったことを知った日の翌日から10カ月以内に作成し、家庭裁判所に提出しなければならない。",
        "answer": "×",
        "explanation": "遺産分割協議書の作成に期限はなく、家庭裁判所への提出も必要ありません。ただし、相続税の申告を行う際には、どのように遺産を分割したのかを示すために、遺産分割協議書の写しを提出する必要があります。相続税の申告期限は相続開始から10カ月以内であるため、結果的に10カ月以内に作成するのが一般的となります。"
      },
      {
        "no": 837,
        "question": "遺産分割協議書は、民法で定められた形式に従って作成し、かつ、共同相続人全員が署名・捺印していなければ無効となる。",
        "answer": "×",
        "explanation": "遺産分割協議書には、民法上の特定の形式はありません。ただし、共同相続人全員の合意が必要であり、実務上は全員の署名・捺印を行うのが一般的です。"
      },
      {
        "no": 838,
        "question": "共同相続人は、一定の場合を除き、遺産の全部ではなく一部の分割内容のみを定めた遺産分割協議書を作成することができる。",
        "answer": "○",
        "explanation": "すべての遺産の分割方法が決まらなかった場合などは、分割協議が調った部分のみの遺産分割協議書を作成することも可能です。"
      },
      {
        "no": 839,

    }

    function check(userAns) {
        lastUserAns = userAns;
        const targetIdx = getCurrentTargetIdx();
        const q = questions[targetIdx];
        document.getElementById('btn-group').style.display = 'none';
        document.getElementById('answer-section').style.display = 'flex';
        const isCorrect = userAns === q.answer;
        const resMsg = document.getElementById('result-msg');
        if (isCorrect) {
            resMsg.innerText = "正解 ✅"; resMsg.style.color = "#ff4d79";
            if (mode === 'test') testCorrectCount++;
            if (mode === 'review') reviewList.shift();
            if (mode === 'fav') favList.shift();
        } else {
            resMsg.innerText = "不正解 ❌"; resMsg.style.color = "#007bff";
            if (!reviewList.includes(targetIdx)) reviewList.push(targetIdx);
            if (mode === 'review') reviewList.push(reviewList.shift());
            if (mode === 'fav') favList.push(favList.shift());
        }
        localStorage.setItem(KEY_REVIEW, JSON.stringify(reviewList));
        localStorage.setItem(KEY_FAV, JSON.stringify(favList));
        document.getElementById('explanation').innerHTML = "<b>正解：" + q.answer + "</b><br>" + q.explanation;
    }

    function next() {
        if (mode === 'test') { testCurrentIdx++; if (testCurrentIdx >= testIndices.length) return showTestResult(); }
        else if (mode === 'normal') { currentIdx++; if (currentIdx >= questions.length) currentIdx = 0; localStorage.setItem(KEY_PROGRESS, currentIdx); }
        update();
    }

    function startTest() {
        const maxIdx = currentIdx === 0 ? 1 : currentIdx;
        let pool = Array.from({length: maxIdx + 1}, (_, i) => i);
        for (let i = pool.length - 1; i > 0; i--) { const r = Math.floor(Math.random() * (i + 1)); [pool[i], pool[r]] = [pool[r], pool[i]]; }
        testIndices = pool.slice(0, 10); mode = 'test'; testCurrentIdx = 0; testCorrectCount = 0; update();
    }

    function openMenu() { document.getElementById('menu-modal').style.display = 'flex'; }
    function closeMenu() { document.getElementById('menu-modal').style.display = 'none'; }
    function finishTest() { mode = 'normal'; update(); }
    function startReview() { mode = 'review'; update(); }
    function startFav() { mode = 'fav'; update(); }
    function toggleFav() {
        const targetIdx = getCurrentTargetIdx(); const qNo = questions[targetIdx].no;
        const pos = favList.indexOf(qNo); if (pos > -1) favList.splice(pos, 1); else favList.push(qNo);
        localStorage.setItem(KEY_FAV, JSON.stringify(favList)); update();
    }
    function saveMemo() { const targetIdx = getCurrentTargetIdx(); const qNo = questions[targetIdx].no; memoData[qNo] = document.getElementById('memo-input').value; localStorage.setItem(KEY_MEMO, JSON.stringify(memoData)); }
    function copyForGemini() {
        const targetIdx = getCurrentTargetIdx(); const q = questions[targetIdx];
        const text = `以下のFP2級の問題について教えてください。\n\n【問題】\n${q.question}\n\n【正解】\n${q.answer}\n\n【解説】\n${q.explanation}\n\n背景や覚え方を詳しく教えて。`;
        navigator.clipboard.writeText(text).then(() => { const toast = document.getElementById('copy-toast'); toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2000); });
    }
    function resetApp() { const btn = document.getElementById('reset-btn'); resetClickCount++; if (resetClickCount === 1) { btn.innerText = "本当によろしいですか？"; btn.style.backgroundColor = "#ffcdd2"; setTimeout(() => { resetClickCount = 0; btn.innerText = "データをリセット"; btn.style.backgroundColor = "#eee"; }, 3000); } else if (resetClickCount === 2) { localStorage.clear(); location.reload(); } }
    function showTestResult() { document.getElementById('test-result-screen').style.display = 'flex'; document.getElementById('test-score-text').innerText = `10問中 ${testCorrectCount}問 正解！`; }
    update();
</script>
</body>
</html>
